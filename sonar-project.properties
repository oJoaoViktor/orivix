# =====================================================================
# SonarCloud — configuração do projeto
#
# SETUP (fazer uma vez):
# 1. Acesse https://sonarcloud.io e faça login com sua conta GitHub
# 2. Clique em "+" > "Analyze new project" > selecione este repositório
# 3. O Sonar vai gerar um SONAR_TOKEN para você
# 4. No GitHub: Settings > Secrets and variables > Actions > New secret
#    Nome: SONAR_TOKEN  |  Valor: o token gerado no passo 3
# 5. Atualize sonar.organization e sonar.projectKey abaixo com os
#    valores que o SonarCloud mostrar após o passo 2
# =====================================================================

sonar.organization=ojoaoviktor
sonar.projectKey=oJoaoViktor_orivix
sonar.projectName=Orivix

sonar.sources=backend
sonar.exclusions=**/migrations/**,**/tests/**,backend/manage.py,backend/config/wsgi.py,backend/config/asgi.py

sonar.tests=backend
sonar.test.inclusions=**/tests/**

sonar.python.coverage.reportPaths=coverage.xml
sonar.python.version=3.13
